[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect configuration
# Astro handles routing, so we don't need a catch-all redirect to index.html
# which can break dynamic routes like /[slug]

# Form handling
[functions]
  directory = "netlify/functions"

# Deploy previews
[context.deploy-preview]
  command = "npm run build"

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# Redirect configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Form handling
[functions]
  directory = "netlify/functions"

# Deploy previews
[context.deploy-preview]
  command = "npm run build"
